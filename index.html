<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mamba RP | Official</title>
    <style>
        :root {
            --neon-blue: #00d2ff;
            --neon-pink: #ff0055;
            --neon-green: #00ff88;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body { background-color: #050505; color: #eee; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { max-width: 1000px; width: 100%; }

        /* Admin Login Style */
        .admin-auth { background: var(--glass); padding: 10px; border-radius: 10px; margin-bottom: 20px; border: 1px dashed rgba(255,255,255,0.1); display: flex; gap: 10px; align-items: center; justify-content: center; }
        .admin-auth input { background: black; border: 1px solid var(--neon-blue); color: white; padding: 5px 10px; border-radius: 5px; outline: none; }
        
        .header-card { background: linear-gradient(135deg, rgba(0,210,255,0.1), rgba(255,0,85,0.1)); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); padding: 50px 20px; border-radius: 30px; text-align: center; margin-bottom: 40px; }
        h1 { color: var(--neon-blue); text-transform: uppercase; letter-spacing: 8px; margin: 0; font-size: 3em; }

        .management-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin-bottom: 40px; }
        .manager-card { background: var(--glass); border: 1px solid rgba(255,255,255,0.1); padding: 15px; border-radius: 15px; text-align: center; }
        .manager-card.dev { border-color: var(--neon-blue); box-shadow: 0 0 10px rgba(0,210,255,0.2); }
        .manager-role { color: var(--neon-pink); font-size: 0.8em; display: block; }

        /* Ticket System Style */
        .ticket-section { background: var(--glass); border: 1px solid rgba(255,255,255,0.1); padding: 30px; border-radius: 20px; margin-top: 50px; }
        .ticket-form input, .ticket-form textarea { width: 100%; background: rgba(0,0,0,0.5); border: 1px solid #333; color: white; padding: 12px; margin-bottom: 10px; border-radius: 8px; box-sizing: border-box; }
        .btn-send { background: var(--neon-blue); color: black; border: none; padding: 10px 25px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-send:hover { background: var(--neon-green); transform: scale(1.05); }

        .ticket-list { margin-top: 20px; }
        .ticket-item { background: rgba(255,255,255,0.03); border: 1px solid #222; padding: 15px; border-radius: 10px; margin-bottom: 10px; border-left: 4px solid var(--neon-pink); }
        .ticket-user { color: var(--neon-blue); font-weight: bold; font-size: 0.9em; }
        .admin-reply-box { margin-top: 10px; padding-left: 15px; border-left: 2px solid var(--neon-green); color: var(--neon-green); font-style: italic; font-size: 0.95em; }
        
        #adminPanel { display: none; margin-top: 20px; border-top: 2px solid var(--neon-pink); padding-top: 20px; }
        .hidden { display: none !important; }

        footer { margin-top: 60px; padding: 20px; color: #444; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <div class="admin-auth">
        <span style="font-size: 0.8em; color: #666;">Admin Access:</span>
        <input type="password" id="adminCode" placeholder="Unesi kod..." oninput="checkAdmin()">
    </div>

    <div class="header-card">
        <h1>Mamba RP</h1>
        <span style="color: var(--neon-green); font-weight: bold;">Simulacija RP Pravog Života</span>
    </div>

    <div class="management-grid">
        <div class="manager-card dev"><strong>ognjen_123</strong><span class="manager-role">Developer & Menadžer</span></div>
        <div class="manager-card"><strong>Stepic</strong><span class="manager-role">Menadžer</span></div>
        <div class="manager-card"><strong>Nikola</strong><span class="manager-role">Menadžer</span></div>
        <div class="manager-card"><strong>Arnel</strong><span class="manager-role">Menadžer</span></div>
        <div class="manager-card"><strong>Peki</strong><span class="manager-role">Menadžer</span></div>
    </div>

    <div class="ticket-section">
        <h2 style="color: #fff; text-transform: uppercase;">Žalbe na igrače (Tiketi)</h2>
        
        <div id="userTicketSection">
            <div class="ticket-form">
                <input type="text" id="userName" placeholder="Vaše Ime i Prezime (IC)">
                <textarea id="ticketMessage" rows="4" placeholder="Opišite vašu žalbu detaljno..."></textarea>
                <button class="btn-send" onclick="sendTicket()">Pošalji Tiket</button>
            </div>
            <div id="myTickets" class="ticket-list">
                <h4 style="color: #666;">Vaši Tiketi:</h4>
                </div>
        </div>

        <div id="adminPanel">
            <h2 style="color: var(--neon-pink);">Admin Panel - Sve Žalbe</h2>
            <div id="allTicketsList" class="ticket-list"></div>
        </div>
    </div>

    <footer>
        <p>Mamba Roleplay / Developer: ognjen_123</p>
    </footer>
</div>

<script>
    const ADMIN_SECRET = "karamobalakaneh";
    let isAdmin = false;

    // Provera admina
    function checkAdmin() {
        const code = document.getElementById('adminCode').value;
        if (code === ADMIN_SECRET) {
            isAdmin = true;
            document.getElementById('adminPanel').style.display = 'block';
            document.getElementById('userTicketSection').classList.add('hidden');
            loadAllTickets();
        } else {
            isAdmin = false;
            document.getElementById('adminPanel').style.display = 'none';
            document.getElementById('userTicketSection').classList.remove('hidden');
        }
    }

    // Slanje tiketa
    function sendTicket() {
        const name = document.getElementById('userName').value;
        const msg = document.getElementById('ticketMessage').value;
        if (!name || !msg) return alert("Popuni sva polja!");

        const ticket = {
            id: Date.now(),
            user: name,
            message: msg,
            reply: "",
            date: new Date().toLocaleString()
        };

        let tickets = JSON.parse(localStorage.getItem('mamba_tickets') || "[]");
        tickets.push(ticket);
        localStorage.setItem('mamba_tickets', JSON.stringify(tickets));

        document.getElementById('userName').value = "";
        document.getElementById('ticketMessage').value = "";
        loadMyTickets();
    }

    // Učitaj samo moje tikete (za obične ljude)
    function loadMyTickets() {
        const list = document.getElementById('myTickets');
        list.innerHTML = '<h4 style="color: #666;">Vaši Tiketi:</h4>';
        const tickets = JSON.parse(localStorage.getItem('mamba_tickets') || "[]");
        
        // U realnosti bi ovde išao login sistem, ali za static sajt koristimo Session storage
        tickets.forEach(t => {
            const div = document.createElement('div');
            div.className = 'ticket-item';
            div.innerHTML = `
                <div class="ticket-user">${t.user} <span style="color:#444; font-size:0.7em;">(${t.date})</span></div>
                <div style="margin-top:5px;">${t.message}</div>
                ${t.reply ? `<div class="admin-reply-box"><strong>ODGOVOR ADMINA:</strong> ${t.reply}</div>` : `<div style="color:#666; font-size:0.8em; margin-top:5px;">Sačekajte odgovor...</div>`}
            `;
            list.appendChild(div);
        });
    }

    // Admin učitava sve (kad ukuca kod)
    function loadAllTickets() {
        const list = document.getElementById('allTicketsList');
        list.innerHTML = "";
        const tickets = JSON.parse(localStorage.getItem('mamba_tickets') || "[]");

        tickets.forEach((t, index) => {
            const div = document.createElement('div');
            div.className = 'ticket-item';
            div.innerHTML = `
                <div class="ticket-user">Od: ${t.user}</div>
                <div style="margin-top:5px;">${t.message}</div>
                <div class="admin-reply-box">
                    <input type="text" id="reply_${index}" placeholder="Napiši odgovor..." style="width:70%; background:#111; border:1px solid #333; color:white; padding:5px;">
                    <button onclick="replyTicket(${index})" style="padding:5px 10px; cursor:pointer; background:var(--neon-green); border:none; border-radius:5px;">Odgovori</button>
                </div>
                ${t.reply ? `<div style="color:white; margin-top:10px;">Trenutni odgovor: ${t.reply}</div>` : ""}
                <button onclick="deleteTicket(${index})" style="margin-top:10px; background:#ff0055; color:white; border:none; border-radius:5px; padding:3px 8px; font-size:0.7em; cursor:pointer;">Obriši Tiket</button>
            `;
            list.appendChild(div);
        });
    }

    function replyTicket(index) {
        const replyText = document.getElementById(`reply_${index}`).value;
        let tickets = JSON.parse(localStorage.getItem('mamba_tickets') || "[]");
        tickets[index].reply = replyText;
        localStorage.setItem('mamba_tickets', JSON.stringify(tickets));
        loadAllTickets();
    }

    function deleteTicket(index) {
        let tickets = JSON.parse(localStorage.getItem('mamba_tickets') || "[]");
        tickets.splice(index, 1);
        localStorage.setItem('mamba_tickets', JSON.stringify(tickets));
        loadAllTickets();
    }

    loadMyTickets();
</script>

</body>
</html>
