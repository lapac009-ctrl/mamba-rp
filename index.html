<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mamba RP | Portfolio</title>
    <style>
        body {
            background-color: #0a0a0a; /* Tamna pozadina */
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        /* Glassmorphism efekat */
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            width: 300px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        h1 { color: #00d2ff; } /* Neon plava */
        p { opacity: 0.8; }
    </style>
</head>
<body>

    <div class="glass-card">
        <h1>Mamba RP</h1>
        <p>Uskoro stiže nešto moćno.</p>
        <p>Roblox & Discord Developer</p>
    </div>

</body>
</html>
